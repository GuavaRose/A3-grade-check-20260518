<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 這裡可以修改瀏覽器分頁上的標題 -->
    <title>出席與討論區成績查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg max-w-lg w-full p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <!-- 這裡可以修改網頁正中央的大字標題 -->
            <h1 class="text-2xl font-bold text-gray-800 mb-2">出席與討論區成績查詢</h1>
            <!-- 這裡可以修改副標題或說明 -->
            <p class="text-sm text-gray-500">（統計截至 5/18）</p>
        </div>

        <!-- Search Form -->
        <div class="mb-6">
            <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-2">請輸入您的學號：</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" 
                    class="flex-1 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-lg disabled:bg-gray-100 disabled:cursor-not-allowed"
                    placeholder="例如：B12345678"
                    onkeypress="if(event.key === 'Enter') searchStudent()" disabled>
                <button id="searchBtn" onclick="searchStudent()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200 disabled:bg-blue-400 disabled:cursor-not-allowed" disabled>
                    載入中...
                </button>
            </div>
            <p id="errorMsg" class="text-red-500 text-sm mt-2 hidden">找不到符合的學生資料，請確認輸入是否正確。</p>
        </div>

        <!-- Result Container (Hidden by default) -->
        <div id="resultContainer" class="hidden bg-blue-50 border border-blue-100 rounded-lg p-6 mb-8">
            <h2 class="text-lg font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">查詢結果</h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">姓名</span>
                    <span id="resName" class="font-semibold text-gray-900 text-lg"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">學號</span>
                    <span id="resId" class="font-semibold text-gray-900"></span>
                </div>
                <div class="h-px bg-blue-200 my-2"></div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">點名應到次數</span>
                    <span class="font-bold text-gray-900 text-lg">11</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">點名有到次數</span>
                    <span id="resPresent" class="font-semibold text-green-600 text-lg"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">點名未到次數</span>
                    <span id="resAbsent" class="font-semibold text-red-500 text-lg"></span>
                </div>
                <div class="h-px bg-blue-200 my-2"></div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">討論區繳交次數</span>
                    <span id="resSubmit" class="font-semibold text-green-600 text-lg"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">缺交次數</span>
                    <span id="resMissing" class="font-semibold text-red-500 text-lg"></span>
                </div>
            </div>
        </div>

        <!-- Notices -->
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-sm text-yellow-800">
            <h3 class="font-bold mb-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                注意事項
            </h3>
            <ul class="list-disc pl-5 space-y-1">
                <li>出缺席統計未計入請假紀錄。</li>
                <li>討論區作業繳交次數為扣除字數不足、內容不符、該週點名未到之後的統計。</li>
                <li class="font-semibold text-red-600">對於結果有任何疑義，請於課堂上向助教反映。</li>
            </ul>
        </div>
        
        <!-- 測試用：顯示所有資料按鈕 -->
        <div class="mt-8 text-center border-t pt-6">
            <button onclick="toggleAllStudents()" class="text-sm text-gray-500 hover:text-blue-600 underline">
                🛠️ 助教測試：展開/隱藏系統讀取到的所有學生名單
            </button>
        </div>

        <!-- 所有學生名單表格 (預設隱藏) -->
        <div id="allStudentsList" class="hidden mt-4 bg-white border border-gray-200 rounded-lg overflow-x-auto max-h-96 shadow-inner">
            <table class="w-full text-sm text-left text-gray-500">
                <thead class="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0">
                    <tr>
                        <th scope="col" class="px-4 py-3 whitespace-nowrap">姓名</th>
                        <th scope="col" class="px-4 py-3 whitespace-nowrap">學號</th>
                        <th scope="col" class="px-4 py-3 text-center whitespace-nowrap">有到</th>
                        <th scope="col" class="px-4 py-3 text-center whitespace-nowrap">未到</th>
                        <th scope="col" class="px-4 py-3 text-center whitespace-nowrap">討論區</th>
                        <th scope="col" class="px-4 py-3 text-center whitespace-nowrap">缺交</th>
                    </tr>
                </thead>
                <tbody id="allStudentsTbody">
                    <!-- 資料將透過 JS 動態產生 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ==========================================
        // 以下為系統程式碼，負責在背景自動抓取您的 CSV 檔案
        // (您不需要再把名單貼在原始碼裡了！)
        // ==========================================
        let studentData = [];

        function parseCSV(csvText) {
            // 處理換行符號
            const lines = csvText.trim().split(/\r?\n/);
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue; // 忽略空行
                
                const values = lines[i].split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header.trim()] = values[index] ? values[index].trim() : '';
                });
                data.push(obj);
            }
            return data;
        }

        async function initData() {
            try {
                // 加上時間戳，防止瀏覽器讀到舊的快取成績
                const timestamp = new Date().getTime();
                
                // 在背景抓取 total.csv 與 stats.csv (取代原本寫死在原始碼的做法)
                const [totalRes, statsRes] = await Promise.all([
                    fetch(`total.csv?t=${timestamp}`),
                    fetch(`stats.csv?t=${timestamp}`)
                ]);

                if (!totalRes.ok || !statsRes.ok) {
                    throw new Error('找不到 CSV 檔案');
                }

                const csvTotal = await totalRes.text();
                const csvStats = await statsRes.text();

                const totalData = parseCSV(csvTotal);
                const statsData = parseCSV(csvStats);

                // 建立 姓名 -> 學號 的對照表
                const nameToIdMap = {};
                totalData.forEach(row => {
                    if (row['學生姓名'] && row['學號']) {
                        nameToIdMap[row['學生姓名']] = row['學號'];
                    }
                });

                // 將學號併入成績表中
                studentData = statsData.map(row => {
                    return {
                        name: row['姓名'],
                        id: nameToIdMap[row['姓名']] || '',
                        present: row['點名有到次數'],
                        absent: row['點名未到次數'],
                        submit: row['討論區繳交次數'],
                        missing: row['缺交次數']
                    };
                }).filter(s => s.name);

                // 資料準備完畢，解鎖搜尋框與按鈕
                document.getElementById('searchInput').disabled = false;
                const searchBtn = document.getElementById('searchBtn');
                searchBtn.disabled = false;
                searchBtn.textContent = '查詢';

            } catch (error) {
                console.error('載入資料失敗:', error);
                const searchBtn = document.getElementById('searchBtn');
                searchBtn.textContent = '資料讀取失敗';
                searchBtn.classList.replace('bg-blue-600', 'bg-red-500');
                alert('系統無法讀取成績檔案，請聯絡助教確認 GitHub 上的 CSV 檔案是否已正確上傳。');
            }
        }

        // 載入網頁時初始化合併資料
        initData();

        function toggleAllStudents() {
            const listDiv = document.getElementById('allStudentsList');
            const tbody = document.getElementById('allStudentsTbody');
            
            if (listDiv.classList.contains('hidden')) {
                // 展開時載入資料
                tbody.innerHTML = '';
                studentData.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b hover:bg-gray-50';
                    
                    // 檢查學號是否成功對應
                    const idDisplay = s.id 
                        ? `<span class="font-mono text-blue-600">${s.id}</span>` 
                        : `<span class="text-red-500 font-bold text-xs bg-red-100 px-2 py-1 rounded">找不到學號</span>`;
                        
                    tr.innerHTML = `
                        <td class="px-4 py-2 font-medium text-gray-900 whitespace-nowrap">${s.name}</td>
                        <td class="px-4 py-2 whitespace-nowrap">${idDisplay}</td>
                        <td class="px-4 py-2 text-center text-green-600">${s.present}</td>
                        <td class="px-4 py-2 text-center text-red-500">${s.absent}</td>
                        <td class="px-4 py-2 text-center text-green-600">${s.submit}</td>
                        <td class="px-4 py-2 text-center text-red-500">${s.missing}</td>
                    `;
                    tbody.appendChild(tr);
                });
                listDiv.classList.remove('hidden');
            } else {
                // 隱藏
                listDiv.classList.add('hidden');
            }
        }

        function searchStudent() {
            const searchInput = document.getElementById('searchInput').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const errorMsg = document.getElementById('errorMsg');

            // 隱藏先前的結果或錯誤訊息
            resultContainer.classList.add('hidden');
            errorMsg.classList.add('hidden');

            if (!searchInput) {
                return;
            }

            // 搜尋邏輯 (僅比對學號，忽略大小寫)
            const student = studentData.find(s => s.id && s.id.toLowerCase() === searchInput.toLowerCase());

            if (student) {
                // 顯示結果
                document.getElementById('resName').textContent = student.name;
                document.getElementById('resId').textContent = student.id;
                document.getElementById('resPresent').textContent = student.present;
                document.getElementById('resAbsent').textContent = student.absent;
                document.getElementById('resSubmit').textContent = student.submit;
                document.getElementById('resMissing').textContent = student.missing;
                
                resultContainer.classList.remove('hidden');
            } else {
                // 顯示錯誤訊息
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
