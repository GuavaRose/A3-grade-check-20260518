<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席與討論區成績查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg max-w-lg w-full p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">出席與討論區成績查詢</h1>
            <p class="text-sm text-gray-500">（整學期最終統計）</p>
        </div>

        <div class="mb-6">
            <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-2">請輸入您的學號：</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" 
                    class="flex-1 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-lg disabled:bg-gray-100 disabled:cursor-not-allowed"
                    placeholder="例如：B12345678"
                    onkeypress="if(event.key === 'Enter') searchStudent()" disabled>
                <button id="searchBtn" onclick="searchStudent()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200 disabled:bg-blue-400 disabled:cursor-not-allowed" disabled>
                    載入中...
                </button>
            </div>
            <p id="errorMsg" class="text-red-500 text-sm mt-2 hidden">找不到符合的學生資料，請確認輸入是否正確。</p>
        </div>

        <!-- 查詢結果區塊 -->
        <div id="resultContainer" class="hidden mb-8">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-5 mb-4 flex justify-between items-center shadow-sm">
                <div>
                    <span class="text-gray-600 text-sm">姓名</span>
                    <div id="resName" class="font-bold text-gray-900 text-xl tracking-wide mt-1"></div>
                </div>
                <div class="text-right">
                    <span class="text-gray-600 text-sm">學號</span>
                    <div id="resId" class="font-mono font-semibold text-blue-700 text-lg mt-1"></div>
                </div>
            </div>

            <!-- 統計結果區塊 -->
            <div class="mb-5">
                <h3 class="font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-3">統計結果</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white border border-gray-200 p-3 rounded-lg text-center shadow-sm flex flex-col justify-between">
                        <div class="text-xs text-gray-500 mb-1">出席次數</div>
                        <div id="resPresent" class="text-2xl font-bold text-green-600"></div>
                    </div>
                    <div class="bg-white border border-gray-200 p-3 rounded-lg text-center shadow-sm flex flex-col justify-between">
                        <div class="text-xs text-gray-500 mb-1">請假次數</div>
                        <div id="resLeave" class="text-2xl font-bold text-gray-600"></div>
                    </div>
                    <div class="bg-white border border-gray-200 p-3 rounded-lg text-center shadow-sm flex flex-col justify-between">
                        <div class="text-xs text-gray-500 mb-1">作業繳交次數</div>
                        <div id="resSubmit" class="text-2xl font-bold text-blue-600"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 注意事項區塊 -->
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-sm text-yellow-800 shadow-sm">
            <h3 class="font-bold mb-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                注意事項
            </h3>
            <ol class="list-decimal pl-5 space-y-1">
                <li>出缺席統計已經計入請假紀錄。</li>
                <li>討論區作業繳交次數為繳交且符合規範的次數，缺交包含：未繳交、字數不足、內容不符等。</li>
                <li class="font-semibold text-red-600">對於結果有任何疑義，請向助教反映。</li>
            </ol>
        </div>
        
        <div class="mt-8 text-center border-t pt-6">
            <button onclick="toggleAllStudents()" class="text-sm text-gray-500 hover:text-blue-600 underline">
                🛠️ 助教測試：展開/隱藏系統讀取到的所有學生名單
            </button>
        </div>

        <!-- 助教測試名單表格 -->
        <div id="allStudentsList" class="hidden mt-4 bg-white border border-gray-200 rounded-lg overflow-x-auto max-h-[500px] shadow-inner">
            <table class="w-full text-sm text-left text-gray-500">
                <thead class="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0 shadow-sm z-10">
                    <tr>
                        <th scope="col" class="px-3 py-3 whitespace-nowrap bg-gray-100 sticky left-0 z-20">姓名</th>
                        <th scope="col" class="px-3 py-3 whitespace-nowrap">學號</th>
                        <th scope="col" class="px-3 py-3 text-center whitespace-nowrap border-l border-gray-300">出席次數</th>
                        <th scope="col" class="px-3 py-3 text-center whitespace-nowrap">請假次數</th>
                        <th scope="col" class="px-3 py-3 text-center whitespace-nowrap">作業繳交次數</th>
                    </tr>
                </thead>
                <tbody id="allStudentsTbody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let studentData = [];

        function parseCSV(csvText) {
            const lines = csvText.trim().split(/\r?\n/);
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue; 
                
                const values = lines[i].split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header.trim()] = values[index] ? values[index].trim() : '';
                });
                data.push(obj);
            }
            return data;
        }

        async function initData() {
            try {
                const timestamp = new Date().getTime();
                const fileName = encodeURIComponent('出席與討論區統計（整學期）.csv');
                const stateRes = await fetch(`${fileName}?t=${timestamp}`);

                if (!stateRes.ok) {
                    throw new Error('找不到指定的 CSV 檔案');
                }

                const csvState = await stateRes.text();
                const stateData = parseCSV(csvState);

                // 依據新規則計算所需欄位
                studentData = stateData.map(row => {
                    const baseSubmit = parseInt(row['討論區繳交次數'] || 0, 10);
                    const extraSubmit = parseInt(row['缺席/請假卻繳交次數'] || 0, 10);

                    return {
                        name: row['姓名'],
                        id: row['學號'] || '',
                        present: parseInt(row['點名有到次數'] || 0, 10),
                        leave: parseInt(row['請假次數'] || 0, 10),
                        calcSubmit: baseSubmit + extraSubmit
                    };
                }).filter(s => s.name);

                document.getElementById('searchInput').disabled = false;
                const searchBtn = document.getElementById('searchBtn');
                searchBtn.disabled = false;
                searchBtn.textContent = '查詢';

            } catch (error) {
                console.error('載入資料失敗:', error);
                const searchBtn = document.getElementById('searchBtn');
                searchBtn.textContent = '資料讀取失敗';
                searchBtn.classList.replace('bg-blue-600', 'bg-red-500');
                alert('系統無法讀取成績檔案，請確認 GitHub 上是否已正確上傳名為「出席與討論區統計（整學期）.csv」的檔案。');
            }
        }

        initData();

        function toggleAllStudents() {
            const listDiv = document.getElementById('allStudentsList');
            const tbody = document.getElementById('allStudentsTbody');
            
            if (listDiv.classList.contains('hidden')) {
                const password = prompt("請輸入助教密碼：");
                if (password !== "GUAVA") {
                    if (password !== null) { 
                        alert("密碼錯誤，拒絕存取！");
                    }
                    return;
                }

                tbody.innerHTML = '';
                studentData.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b hover:bg-gray-50';
                    
                    const idDisplay = s.id 
                        ? `<span class="font-mono text-blue-600">${s.id}</span>` 
                        : `<span class="text-red-500 font-bold text-xs bg-red-100 px-2 py-1 rounded">無學號資料</span>`;
                        
                    tr.innerHTML = `
                        <td class="px-3 py-3 font-medium text-gray-900 whitespace-nowrap bg-white sticky left-0 z-10 shadow-[1px_0_0_0_#e5e7eb]">${s.name}</td>
                        <td class="px-3 py-3 whitespace-nowrap">${idDisplay}</td>
                        <td class="px-3 py-3 text-center text-green-600 border-l border-gray-200">${s.present}</td>
                        <td class="px-3 py-3 text-center text-gray-600">${s.leave}</td>
                        <td class="px-3 py-3 text-center text-blue-600">${s.calcSubmit}</td>
                    `;
                    tbody.appendChild(tr);
                });
                listDiv.classList.remove('hidden');
            } else {
                listDiv.classList.add('hidden');
            }
        }

        function searchStudent() {
            const searchInput = document.getElementById('searchInput').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const errorMsg = document.getElementById('errorMsg');

            resultContainer.classList.add('hidden');
            errorMsg.classList.add('hidden');

            if (!searchInput) {
                return;
            }

            const student = studentData.find(s => s.id && s.id.toLowerCase() === searchInput.toLowerCase());

            if (student) {
                document.getElementById('resName').textContent = student.name;
                document.getElementById('resId').textContent = student.id;
                
                document.getElementById('resPresent').textContent = student.present;
                document.getElementById('resLeave').textContent = student.leave;
                document.getElementById('resSubmit').textContent = student.calcSubmit;
                
                resultContainer.classList.remove('hidden');
            } else {
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
